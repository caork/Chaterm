name: Build All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-win-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Patch package-lock
        run: node scripts/patch-package-lock.js

      - name: Install dependencies
        run: npm install

      - name: Build and package Windows x64
        run: npm run build:global && npx electron-builder --win --x64 --config electron-builder.global.yml
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DatacubeChaterm-win-x64
          path: |
            dist/global/*-setup-x64.exe
          retention-days: 30

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Patch package-lock
        run: node scripts/patch-package-lock.js

      - name: Install dependencies
        run: npm install

      - name: Build and package macOS arm64
        run: npm run build:global && npx electron-builder --mac --arm64 --config electron-builder.global.yml
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DatacubeChaterm-macos-arm64
          path: |
            dist/global/*.dmg
            dist/global/*.zip
          retention-days: 30
